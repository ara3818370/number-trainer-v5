<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Number Trainer">
  <meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1c1c1e" media="(prefers-color-scheme: dark)">
  <title>Number Trainer</title>

  <!-- FOUC prevention: apply saved theme before CSS loads -->
  <script>
    (function(){
      var t = localStorage.getItem('nlt-theme');
      if (t) t = t.replace(/"/g, '');
      if (t === 'dark' || t === 'light') document.documentElement.setAttribute('data-theme', t);
    })();
  </script>

  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>

  <!-- ════════════════════════════════════════════════════════════════════
       SVG Icon Templates (24×24, stroke="currentColor", stroke-width="2")
       ════════════════════════════════════════════════════════════════════ -->

  <!-- Category Icons -->
  <template id="icon-cardinals">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/>
      <line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/>
    </svg>
  </template>

  <template id="icon-ordinals">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="14" width="5" height="7" rx="1"/><rect x="9.5" y="6" width="5" height="15" rx="1"/><rect x="16" y="10" width="5" height="11" rx="1"/>
    </svg>
  </template>

  <template id="icon-years">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 3h14"/><path d="M5 21h14"/><path d="M7 3l5 9-5 9"/><path d="M17 3l-5 9 5 9"/>
    </svg>
  </template>

  <template id="icon-fractions">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="9"/><line x1="7" y1="17" x2="17" y2="7"/>
    </svg>
  </template>

  <template id="icon-decimals">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="3" y1="12" x2="9" y2="12"/><circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/><line x1="15" y1="12" x2="21" y2="12"/>
    </svg>
  </template>

  <template id="icon-currencies">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="9"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="16" y2="14"/>
    </svg>
  </template>

  <template id="icon-percentages">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="8" cy="8" r="2.5"/><circle cx="16" cy="16" r="2.5"/><line x1="19" y1="5" x2="5" y2="19"/>
    </svg>
  </template>

  <template id="icon-roomBus">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="4" y="5" width="16" height="14" rx="3"/><rect x="8" y="9" width="8" height="6" rx="1"/>
    </svg>
  </template>

  <template id="icon-sports">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="6" width="7" height="14" rx="1"/><rect x="14" y="4" width="7" height="16" rx="1"/>
      <circle cx="12" cy="10" r="0.75" fill="currentColor" stroke="none"/><circle cx="12" cy="14" r="0.75" fill="currentColor" stroke="none"/>
    </svg>
  </template>

  <template id="icon-temperatures">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 14.76V3a2 2 0 0 0-4 0v11.76a4 4 0 1 0 4 0z"/><circle cx="12" cy="18" r="1" fill="currentColor" stroke="none"/>
    </svg>
  </template>

  <template id="icon-large">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="5" cy="14" r="2.5"/><circle cx="12" cy="13" r="3.5"/><circle cx="19.5" cy="12" r="4"/>
    </svg>
  </template>

  <template id="icon-mixed">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M16 3h5v5"/><path d="M4 20L21 3"/><path d="M21 16v5h-5"/><path d="M15 15l6 6"/><path d="M4 4l5 5"/>
    </svg>
  </template>

  <!-- UI Icons -->
  <template id="icon-settings">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="5" r="1.5" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="12" cy="19" r="1.5" fill="currentColor" stroke="none"/>
    </svg>
  </template>

  <template id="icon-back">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
  </template>

  <template id="icon-close">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </template>

  <template id="icon-play">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="6,3 20,12 6,21"/>
    </svg>
  </template>

  <template id="icon-focus">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 4c2-1 5-1 10 1v16c-5-2-8-2-10-1z"/><path d="M22 4c-2-1-5-1-10 1v16c5-2 8-2 10-1z"/>
    </svg>
  </template>

  <template id="icon-audio">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="6,9 2,9 2,15 6,15 11,19 11,5"/><path d="M15 9a4 4 0 0 1 0 6"/><path d="M18 6a8 8 0 0 1 0 12"/>
    </svg>
  </template>

  <template id="icon-speed">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="4" y1="8" x2="10" y2="8"/><line x1="4" y1="12" x2="15" y2="12"/><line x1="4" y1="16" x2="20" y2="16"/>
    </svg>
  </template>

  <template id="icon-globe">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><ellipse cx="12" cy="12" rx="4" ry="10"/><line x1="2" y1="12" x2="22" y2="12"/>
    </svg>
  </template>

  <template id="icon-checkmark">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  </template>

  <template id="icon-lock">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/>
    </svg>
  </template>


  <!-- ════════════════════════════════════════════════════════════════════
       Screen 1: Language Selection (first launch only)
       ════════════════════════════════════════════════════════════════════ -->

  <section id="screen-lang-select" class="screen">
    <div class="lang-select-content">
      <h1 class="lang-select-title">Number Trainer</h1>
      <p class="lang-select-subtitle" data-i18n="langSelect.subtitle">Choose language</p>

      <div class="lang-select-buttons">
        <button class="lang-select-btn" data-lang="en">
          <span class="lang-flag">🇬🇧</span>
          <span class="lang-name">English</span>
        </button>
        <button class="lang-select-btn" data-lang="de">
          <span class="lang-flag">🇩🇪</span>
          <span class="lang-name">Deutsch</span>
        </button>
        <button class="lang-select-btn" data-lang="uk">
          <span class="lang-flag">🇺🇦</span>
          <span class="lang-name">Українська</span>
        </button>
      </div>
    </div>
  </section>


  <!-- ════════════════════════════════════════════════════════════════════
       Screen 5: Onboarding (first launch, after language)
       ════════════════════════════════════════════════════════════════════ -->

  <section id="screen-onboarding" class="screen">
    <div class="onboarding-content">
      <!-- Breathing circle — same as training -->
      <div id="onboarding-circle" class="breathing-circle" role="button" aria-label="Play number"></div>

      <!-- Two options (full-width, stacked) -->
      <div id="onboarding-options" class="onboarding-options">
        <button class="option-btn onboarding-option" data-index="0"></button>
        <button class="option-btn onboarding-option" data-index="1"></button>
      </div>

      <!-- Message after answer -->
      <p id="onboarding-message" class="onboarding-message hidden" aria-live="polite"></p>
    </div>
  </section>


  <!-- ════════════════════════════════════════════════════════════════════
       Screen 2: Category Selection
       ════════════════════════════════════════════════════════════════════ -->

  <section id="screen-menu" class="screen">
    <div class="menu-header">
      <h1 class="menu-title" data-i18n="menu.title">Number Trainer</h1>
      <button id="btn-settings" class="btn-settings" aria-label="Settings">
        <!-- ⋮ icon inline -->
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="5" r="1.5" fill="currentColor"/>
          <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
          <circle cx="12" cy="19" r="1.5" fill="currentColor"/>
        </svg>
      </button>
    </div>

    <!-- Category grid — rendered dynamically by JS, structure for reference -->
    <div id="category-grid" class="category-grid" data-count="1">
      <!-- JS renders category cards here. Example card structure:
      <button class="category-card" data-category="cardinals">
        <div class="category-icon">[SVG from template]</div>
        <span class="category-title">Cardinals</span>
        <span class="category-subtitle">1, 2, 3...</span>
        <div class="checkmark hidden">[checkmark SVG]</div>
      </button>
      <button class="category-card locked" data-category="ordinals">
        <div class="category-icon">[SVG from template]</div>
        <span class="category-title">Ordinals</span>
        <span class="category-subtitle">1st, 2nd, 3rd...</span>
        <div class="lock-overlay">
          <svg class="lock-icon" ...></svg>
        </div>
      </button>
      -->
    </div>

    <!-- "Unlock All" hidden gesture area (swipe-down on header) -->
    <div id="unlock-all-zone" class="unlock-all-zone" aria-hidden="true"></div>

    <!-- Settings overlay is created dynamically by settings.js -->
  </section>


  <!-- ════════════════════════════════════════════════════════════════════
       Screen 3: Training
       ════════════════════════════════════════════════════════════════════ -->

  <section id="screen-training" class="screen">
    <!-- Progress bar (3px, top of screen) -->
    <div class="progress-bar">
      <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
    </div>

    <!-- Minimal header -->
    <div class="training-header">
      <button id="btn-back" class="btn-back" aria-label="Back">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <span id="category-indicator" class="category-indicator"></span>
      <span id="streak-counter" class="streak-counter"></span>
    </div>

    <!-- Training area (flex column) -->
    <div class="training-area">
      <!-- Breathing circle (audio mode) -->
      <div id="breathing-circle" class="breathing-circle" role="button" aria-label="Play number" tabindex="0"></div>

      <!-- Focus mode card (hidden by default) -->
      <div id="focus-card" class="focus-card hidden">
        <div id="focus-number" class="focus-number"></div>
        <p id="focus-prompt" class="focus-prompt" data-i18n="focus.prompt">What number is this?</p>
      </div>

      <!-- Options 2×2 grid -->
      <div id="options-grid" class="options-grid">
        <button class="option-btn" data-index="0"></button>
        <button class="option-btn" data-index="1"></button>
        <button class="option-btn" data-index="2"></button>
        <button class="option-btn" data-index="3"></button>
      </div>
    </div>

    <!-- Score display (legacy compat) -->
    <span id="score-display" class="score-display hidden">0/0 — 0%</span>

    <!-- Streak counter (fixed bottom) — positioned via CSS -->
  </section>


  <!-- ════════════════════════════════════════════════════════════════════
       Screen 4: Summary
       ════════════════════════════════════════════════════════════════════ -->

  <section id="screen-summary" class="screen">
    <div class="summary-content">
      <div id="summary-percent" class="summary-percent">0%</div>
      <p class="summary-subtitle">
        <span id="summary-correct">0</span> <span data-i18n="summary.of">of</span> <span id="summary-total">0</span> <span data-i18n="summary.correct">correct</span>
      </p>
      <p id="summary-category" class="summary-category"></p>

      <div class="summary-actions">
        <button id="btn-new-session" class="btn-primary" data-i18n="summary.again">Again</button>
        <button id="btn-home" class="btn-ghost" data-i18n="summary.categories">Categories</button>
      </div>
    </div>
  </section>


  <!-- ════════════════════════════════════════════════════════════════════
       Screen 5: Error (fallback)
       ════════════════════════════════════════════════════════════════════ -->

  <section id="screen-error" class="screen">
    <div class="error-content">
      <div class="emoji-hero" aria-hidden="true">⚠️</div>
      <h1 data-i18n="error.title">Speech problem</h1>
      <p id="error-message" data-i18n="error.message">
        Your browser does not support speech synthesis.
      </p>
      <button id="btn-error-retry" class="btn-primary" data-i18n="error.retry">Try again</button>
    </div>
  </section>


  <!-- ════════════════════════════════════════════════════════════════════
       Toast notification
       ════════════════════════════════════════════════════════════════════ -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>


  <!-- JS entry point -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
